name: main3

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:
jobs:
  run-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Docker container
        run: |
          docker run \
            --cap-add=NET_ADMIN \
            --device=/dev/net/tun \
            akarijukatou/r12
